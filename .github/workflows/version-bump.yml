name: Auto Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    # Guard against the bump commit below re-triggering this workflow.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump manifest.json patch version
        id: bump
        run: |
          current=$(jq -r '.version' custom_components/dash480/manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          jq --arg v "$new" '.version = $v' custom_components/dash480/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/dash480/manifest.json
          echo "new_version=$new" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/dash480/manifest.json
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.new_version }}"
